<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>FMSS</title>
    <script src="https://cdn.bootcss.com/jquery/3.0.0/jquery.min.js"></script>

    <script type="text/javascript" src="https://assets.pyecharts.org/assets/echarts.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/echarts/4.2.1/echarts.js"></script>
</head>

<body>
    <div id="bar" style="width:600; height:300px;"></div>
    <div id="step_chart" style="width:600px; height:300px;"></div>
    <div id="weight_chart" style="width:600px; height:300px;"></div>
    <script>
        function getVirtulData(year) {
            year = year || '2019';
            var date = +echarts.number.parseDate(year + '-01-01');
            var end = +echarts.number.parseDate(year + '-12-31');
            var dayTime = 3600 * 24 * 1000;
            var data = [];
            for (var time = date; time <= end; time += dayTime) {
                data.push([
                    echarts.format.formatTime('yyyy-MM-dd', time),
                    Math.floor(Math.random() * 10000)
                ]);
            }
            console.log(data);
            return data;
        }

        $(
            function () {
                var time_chart = echarts.init(document.getElementById('bar'), 'white', { renderer: 'canvas' });
                time_option = {
                    visualMap: {
                        show: false,
                        min: 0,
                        max: 10000
                    },
                    calendar: {
                        range: '2019'
                    },
                    series: {
                        type: 'heatmap',
                        coordinateSystem: 'calendar',
                        data: getVirtulData(2019)
                    }
                };
                // time_chart.setOption(time_option);

                var step_chart = echarts.init(document.getElementById('step_chart'), 'white', { renderer: 'canvas' });
                var step_option = {
                    dataZoom: [
                        {
                            show: true,
                            realtime: true,
                            start: 50,
                            end: 100
                        },
                        {
                            type: 'inside',
                            realtime: true,
                            start: 50,
                            end: 100
                        }
                    ],
                    xAxis: [
                        {
                            type: 'category',
                            boundaryGap: false,
                            axisLine: { onZero: false }
                        }
                    ],
                    yAxis: [
                        {
                            name: '步数',
                            type: 'value'
                        }
                    ],
                    series: [
                        {
                            name: '步数',
                            type: 'line',
                            animation: false,
                            areaStyle: {
                            },
                            lineStyle: {
                                width: 1
                            },
                            label: {
                                show: true
                            },
                            markLine: {
                                data: [
                                    {
                                        name: '平均线',
                                        // 支持 'average', 'min', 'max'
                                        type: 'average'
                                    }]
                            }
                        }
                    ]
                };
                $.ajax({
                    type: "GET",
                    url: "http://127.0.0.1:5000/getstep",
                    dataType: 'json',
                    success: function (result) {
                        console.log(result);
                        step_option['xAxis'][0]['data'] = result['time'];
                        step_option['series'][0]['data'] = result['value'];
                        step_chart.setOption(step_option);
                        console.log(step_option);
                    }
                });



                var weight_chart = echarts.init(document.getElementById('weight_chart'), 'white', { renderer: 'canvas' });
                var weight_option = JSON.parse(JSON.stringify(step_option));;
                
                weight_option['yAxis'][0]['name']='体重';
                weight_option['series'][0]['name']='体重';
                $.ajax({
                    type: "GET",
                    url: "http://127.0.0.1:5000/getweight",
                    dataType: 'json',
                    success: function (result) {
                        console.log(result);
                        weight_option['xAxis'][0]['data'] = result['time'];
                        weight_option['series'][0]['data'] = result['value'];
                        weight_chart.setOption(weight_option);
                        console.log(weight_option);
                    }
                });


            }
        )
    </script>
</body>

</html>
