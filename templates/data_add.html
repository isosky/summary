<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FMSS_data_add</title>
    <script src="https://cdn.bootcss.com/jquery/3.0.0/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/popper.js/1.12.9/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.bootcss.com/bootstrap/4.0.0/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.bootcss.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">



</head>

<body>
    <div class="container">
        <div class="row">
            <select class="custom-select" id="inputGroupSelect">
                <option value="1">步数</option>
                <option value="2">体重</option>
            </select>
            <input id="t_step" type="text" class="form-control col-sm-8" placeholder="20190801,10000;20190802,7000;"
                aria-describedby="basic-addon1"></input>
            <button id="b_step_add" type="button" class="btn btn-primary">提交</button>
            <button id="b_step_clear" type="button" class="btn btn-primary">清空表格</button>
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">date</th>
                <th scope="col">step</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script>
        $("#inputGroupSelect").val()
        $("#b_step_clear").click(function () {
            $("tbody tr").empty("");
        });
        $("#b_step_add").click(function () {
            $.ajax({
                type: "GET",
                url: "http://127.0.0.1:5000/data_add_v",
                data: { "data": $("#t_step").val(), "type": $("#inputGroupSelect").val() },
                dataType: 'json',
                success: function (result) {
                    temp = result["result"];
                    $("tbody tr").empty("");
                    for (var i = 0; i < temp.length; i++) {
                        console.log(temp[i]);
                        $("tbody").append($("<tr><td>" + temp[i][0] + "</td><td>" + temp[i][1] + "</td></tr>"));
                    }
                }
            });
        });
    </script>
</body>
